<!--liquid-->
<nav>
    {% for item in site.data.navigation %}
    <div class="nav-bar">
        <a href="{{ site.baseurl }}{{ item.link }}" {% if page.url == item.link %} class="current" {%endif%}>{{ item.name }}</a>
        {% if item.sublinks %}
            <ul class="dropdown">
                {% for post in site.posts %}
                    <li><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>
    {% endfor %}
</nav>
