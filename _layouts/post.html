---
layout: default
---

<h1>{{ page.title }}</h1>
<p>
    {{ page.date | date_to_string}}
    {% assign member = site.team | where: 'short_name', page.member | first %}
    <!-- where the short_name in <member>.md matches member in <post>.md,
        return only to the first value -->
    {% if member %}
        - <a href="/practice1_jekyllFromScratch/{{ member.url }}">{{ member.name }}</a>
    {% endif %}
</p>

{{ content }}
